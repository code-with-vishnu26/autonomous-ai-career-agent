# Edge reverse proxy (Phase 59, ADR-0076): the single public entry point.
# Browser -> [this] -> frontend:8080 (static SPA) / backend:8000 (API).
# Route split mirrors frontend/vite.config.ts's own dev-server proxy list
# (API_PREFIXES) -- one source of truth for "which paths are backend
# paths", not reinvented here. Kept in sync through Phase 71 (ADR-0089),
# which added /export/resume/{id}.pdf (the signed résumé-download link an
# exported workbook's "Résumé (PDF)" cell points at -- it must reach the
# backend through this same public origin, not a bare :8000 the API_BASE_URL
# setting would otherwise have to name directly).
#
# NOTE (known gap, not introduced or fixed here): /coach, /notifications,
# /notification-settings and /organizations are *also* client-side React
# Router routes (vite.config.ts's comment above ``apiProxy()`` explains
# why), so a browser refresh/deep-link on one of those pages through this
# proxy still gets the backend's raw JSON instead of the SPA -- the same
# problem vite.config.ts's dev-server ``bypass`` fixed for local dev by
# checking ``Accept: text/html``. This file has no equivalent split yet;
# doing so safely needs an nginx ``resolver`` + variable-upstream
# ``proxy_pass`` (Docker Compose's embedded DNS), which is not wired here.

upstream frontend_upstream {
    server frontend:8080;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # HTTPS readiness: mount a certificate pair and uncomment the TLS
    # server block in deploy/nginx/edge-tls.conf.example (renamed to
    # edge-tls.conf and included below) to terminate TLS here instead of
    # plain HTTP -- see docs/deployment/production.md. Left as plain HTTP
    # by default because this repository ships no certificate and
    # generating a self-signed one silently would be a false "it's
    # secured" signal nobody asked for.

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # script-src has no 'unsafe-inline'/'unsafe-eval' -- the SPA build has
    # no inline <script>, only its own hashed module bundle (Phase 61,
    # ADR-0079). style-src keeps 'unsafe-inline' because React and Recharts
    # (the dashboard's charting library) set inline style="..." attributes
    # at runtime; there is no build-time nonce/hash mechanism wired for
    # that today -- a documented, deliberate loosening, not an oversight.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(api|auth|user|coach|discover|prepare|reviews|submissions|export|organizations|team|billing|notifications|notification-settings)/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Refresh tokens travel in an httpOnly cookie (ADR-0074) -- must
        # pass through untouched, no cookie rewriting here.
        proxy_pass_header Set-Cookie;
    }

    location = /health {
        proxy_pass http://backend_upstream/health;
        proxy_set_header Host $host;
    }

    location = /ready {
        proxy_pass http://backend_upstream/ready;
        proxy_set_header Host $host;
    }

    location = /metrics {
        proxy_pass http://backend_upstream/metrics;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
