# Edge reverse proxy (Phase 59, ADR-0076): the single public entry point.
# Browser -> [this] -> frontend:8080 (static SPA) / backend:8000 (API).
# Route split mirrors frontend/vite.config.ts's own dev-server proxy list
# exactly (/api, /auth, /user, /coach) -- one source of truth for "which
# paths are backend paths", not reinvented here.

upstream frontend_upstream {
    server frontend:8080;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # HTTPS readiness: mount a certificate pair and uncomment the TLS
    # server block in deploy/nginx/edge-tls.conf.example (renamed to
    # edge-tls.conf and included below) to terminate TLS here instead of
    # plain HTTP -- see docs/deployment/production.md. Left as plain HTTP
    # by default because this repository ships no certificate and
    # generating a self-signed one silently would be a false "it's
    # secured" signal nobody asked for.

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(api|auth|user|coach)/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Refresh tokens travel in an httpOnly cookie (ADR-0074) -- must
        # pass through untouched, no cookie rewriting here.
        proxy_pass_header Set-Cookie;
    }

    location = /health {
        proxy_pass http://backend_upstream/health;
        proxy_set_header Host $host;
    }

    location = /ready {
        proxy_pass http://backend_upstream/ready;
        proxy_set_header Host $host;
    }

    location = /metrics {
        proxy_pass http://backend_upstream/metrics;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
