# Server block for the frontend container: serves the built React SPA only.
# API routing (/api, /auth, /user, /coach) is the *edge* nginx's job
# (deploy/nginx/edge.conf) -- this container never talks to the backend
# directly, matching the target architecture (Browser -> Nginx -> React ->
# FastAPI): the edge proxy decides where a request goes, this one only
# ever serves static files.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Liveness/readiness for Dockerfile.frontend's HEALTHCHECK and
    # docker-compose's healthcheck: block -- deliberately not `/health`,
    # so it can never collide with a real backend route once this
    # container sits behind the edge proxy.
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed build assets (Vite's default `assets/*-<hash>.js/css`) are
    # safe to cache forever -- a content change always produces a new
    # filename, never a stale cache hit.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any path not matching a real static file resolves to
    # index.html, so a browser refresh on e.g. /coach/resume-analysis
    # still loads the app instead of a raw 404 -- React Router (client-
    # side) then renders the right page.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Baseline security headers -- HSTS is deliberately left to the edge
    # proxy (deploy/nginx/edge.conf), the layer that actually terminates
    # TLS and knows whether HTTPS is really in use. CSP is duplicated from
    # edge.conf (Phase 61, ADR-0079) -- same defense-in-depth precedent as
    # the other three headers here: this container is reachable directly
    # in dev/Compose-without-edge setups, not only through the edge proxy.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
}
