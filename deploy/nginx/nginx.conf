# Main nginx config for the frontend's static-file server (Dockerfile.frontend).
# No `user` directive: the container already runs as a non-root user
# (Dockerfile.frontend's USER career-agent), so there is no root process to
# drop privileges from -- a `user` directive here would make nginx try (and
# fail) to setuid on startup.

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" $request_time';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
        application/xml image/svg+xml;
    gzip_min_length 1024;

    include /etc/nginx/conf.d/*.conf;
}
