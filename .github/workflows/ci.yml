name: CI

# Zero-cost, fail-closed release gate (ADR-0057). Runs the full backend test
# suite, architecture contracts, and a real packaging + clean-install +
# offline smoke on every supported OS, plus (Phase 55, ADR-0073) the
# frontend's type-check/lint/test/build in a parallel job. Never uses
# continue-on-error, never references a secret, and never makes a live LLM
# call -- the network guard in tests/conftest.py blocks it even if a key
# were somehow present.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal token scope: this workflow only reads the repository and never
# writes back to it, tags anything, or publishes anything.
permissions:
  contents: read

# A new push to the same branch/PR cancels the previous in-flight run
# instead of letting both finish (keeps CI minutes bounded).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux is the exercised, fully-supported platform. Windows proves
        # the explicit-UTF-8 cross-platform contract (ADR-0056) by actually
        # running on it, not by inference from Linux passing. macOS is a
        # deliberate, documented gap (ADR-0056: untested, not a cost
        # multiplier this project accepts today) -- not silently skipped,
        # named.
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project (editable, with dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Import-linter (architecture contracts)
        run: lint-imports

      - name: Test suite
        run: python -m pytest

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify release artifacts contain no secrets/private data
        run: python scripts/verify_release_artifacts.py

      - name: Clean-venv install + CLI smoke (--help, offline setup)
        run: python scripts/smoke_test_wheel.py

  verify-frontend:
    name: verify-frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Same platform pair as the backend `verify` job (ADR-0056).
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Test suite (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
