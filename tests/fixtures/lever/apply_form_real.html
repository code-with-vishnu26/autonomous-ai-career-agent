<!DOCTYPE html>
<!--
  Offline stand-in for the REAL Lever apply-form shape (Phase 11,
  ADR-0035), carrying every load-bearing property the ADR-0029 human
  inspection confirmed on a live jobs.lever.co posting:

    - identity fields have NO id attribute, only name: a single
      [name='name'] field (full name, never split) and [name='email']
    - the resume is a required FILE UPLOAD (input type=file,
      name='resume') -- there is no manual-text path at all
    - the challenge is hCaptcha-shaped markup (div#h-captcha)
    - the submit action is #btn-submit

  Query params drive test scenarios, same convention as the other
  fixtures: ?challenge=1 shows the hCaptcha panel after submit is
  clicked instead of completing. window.__clearChallenge() simulates the
  human solving it -- this project never solves challenges itself.
-->
<html>
<head><title>Apply - Acme (Lever real-shape fixture)</title></head>
<body>
  <form id="application-form">
    <input name="name" type="text" required placeholder="Full name" />
    <input name="email" type="email" required placeholder="Email" />
    <li class="application-question resume">
      <label>Attach Resume/CV</label>
      <input name="resume" type="file" required />
    </li>
    <button id="btn-submit" type="button">Submit application</button>
  </form>

  <div id="h-captcha" style="display:none;">
    hCaptcha: please verify you are human.
  </div>

  <div id="application-success" style="display:none;">
    Application submitted successfully.
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const challengeEnabled = params.get("challenge") === "1";

    window.__clearChallenge = function () {
      document.getElementById("h-captcha").style.display = "none";
    };

    document.getElementById("btn-submit").addEventListener("click", function () {
      const challengeVisible =
        document.getElementById("h-captcha").style.display !== "none";
      if (challengeVisible) {
        return;
      }
      if (challengeEnabled && !window.__challengeShown) {
        window.__challengeShown = true;
        document.getElementById("h-captcha").style.display = "block";
        return;
      }
      document.getElementById("application-success").style.display = "block";
    });
  </script>
</body>
</html>
